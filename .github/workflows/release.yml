name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build -o logs-linter ./cmd/logs-linter

      - name: Build for multiple platforms
        run: |
          GOOS=linux GOARCH=amd64 go build -o logs-linter-linux-amd64 ./cmd/logs-linter
          GOOS=linux GOARCH=arm64 go build -o logs-linter-linux-arm64 ./cmd/logs-linter
          GOOS=darwin GOARCH=amd64 go build -o logs-linter-darwin-amd64 ./cmd/logs-linter
          GOOS=darwin GOARCH=arm64 go build -o logs-linter-darwin-arm64 ./cmd/logs-linter
          GOOS=windows GOARCH=amd64 go build -o logs-linter-windows-amd64.exe ./cmd/logs-linter
          GOOS=windows GOARCH=arm64 go build -o logs-linter-windows-arm64.exe ./cmd/logs-linter

      - name: Create checksums
        run: |
          sha256sum logs-linter-linux-amd64 > logs-linter-linux-amd64.sha256
          sha256sum logs-linter-linux-arm64 > logs-linter-linux-arm64.sha256
          sha256sum logs-linter-darwin-amd64 > logs-linter-darwin-amd64.sha256
          sha256sum logs-linter-darwin-arm64 > logs-linter-darwin-arm64.sha256
          sha256sum logs-linter-windows-amd64.exe > logs-linter-windows-amd64.exe.sha256
          sha256sum logs-linter-windows-arm64.exe > logs-linter-windows-arm64.exe.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            logs-linter-linux-amd64
            logs-linter-linux-amd64.sha256
            logs-linter-linux-arm64
            logs-linter-linux-arm64.sha256
            logs-linter-darwin-amd64
            logs-linter-darwin-amd64.sha256
            logs-linter-darwin-arm64
            logs-linter-darwin-arm64.sha256
            logs-linter-windows-amd64.exe
            logs-linter-windows-amd64.exe.sha256
            logs-linter-windows-arm64.exe
            logs-linter-windows-arm64.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
